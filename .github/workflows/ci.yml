name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run unit tests
        run: |
          pytest cli_anything/greeninvoice/tests/test_core.py -v

      - name: Run offline E2E tests
        run: |
          CLI_ANYTHING_FORCE_INSTALLED=1 pytest cli_anything/greeninvoice/tests/test_full_e2e.py -v -k "TestOfflineCLI"

      # Sandbox E2E tests only run on push to main (not PRs from forks)
      # and require the MORNING_SANDBOX_* secrets to be configured.
      - name: Run sandbox E2E tests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          MORNING_SANDBOX_ID: ${{ secrets.MORNING_SANDBOX_ID }}
          MORNING_SANDBOX_SECRET: ${{ secrets.MORNING_SANDBOX_SECRET }}
        run: |
          if [ -n "$MORNING_SANDBOX_ID" ] && [ -n "$MORNING_SANDBOX_SECRET" ]; then
            GREENINVOICE_SANDBOX_ID="$MORNING_SANDBOX_ID" \
            GREENINVOICE_SANDBOX_SECRET="$MORNING_SANDBOX_SECRET" \
            CLI_ANYTHING_FORCE_INSTALLED=1 \
            pytest cli_anything/greeninvoice/tests/test_full_e2e.py -v -k "TestSandboxCLI"
          else
            echo "Sandbox secrets not configured — skipping live E2E tests"
          fi
